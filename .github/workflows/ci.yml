name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compute-image-tag:
    name: Compute Image Tag
    uses: ./.github/workflows/_compute_image_tag.yml

  devcontainer:
    name: Build Devcontainer
    needs: compute-image-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ needs.compute-image-tag.outputs.image_tag }}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          imageTag: ${{ needs.compute-image-tag.outputs.image_tag }}
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer:${{ needs.compute-image-tag.outputs.image_tag }}
          push: always

  static:
    name: Run Static Analysis
    needs: devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          imageTag: ${{ needs.devcontainer.outputs.image_tag }}
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer:${{ needs.devcontainer.outputs.image_tag }}
          push: never
          runCmd: just static

  test:
    name: Run Tests
    needs: devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          imageTag: ${{ needs.devcontainer.outputs.image_tag }}
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer:${{ needs.devcontainer.outputs.image_tag }}
          push: never
          runCmd: just test

  done:
    name: 🥳
    needs: [test, static]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Done"