id: bunnys-knees
description: Rodillas de Conejo

components:
  - id: service
    description: Service
    preparations:
      - id: service
        description: Service
        final: true
        steps:
          - instruction: Combine mezcal, vodka, carrot syrup, lemon juice, and saline solution in a cocktail shaker with ice. Shake until well chilled, about 15 seconds
            equipment:
              - cocktail shaker
            ingredients:
              - name: mezcal
                qty: 1
                unit: ounce
                note: 400 Conejos
              - name: vodka
                qty: 1
                unit: ounce
              - name: carrot syrup
                homemade: true
                qty: 0.75
                unit: ounce
              - name: lemon juice, fresh
                qty: 0.75
                unit: ounce
                source: Rainbow Grocery
              - name: 20% saline solution
                homemade: true
                qty: 5
                unit: drops
          - instruction: Double strain into a chilled coupe glass
          - instruction: Express lemon peel and add as garnish
        storage: Serve immediately
