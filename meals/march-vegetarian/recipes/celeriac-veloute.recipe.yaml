name: Roasted Celeriac Velouté
inspiration:
  - https://kitcheninspirations.wordpress.com/2013/03/14/celeriac-veloute-or-soup
phases:
  - name: make-stock
    description: Make vegetable stock
    ingredients:
      - name: various vegetables, such as carrots, celery, onion, garlic, and herbs (whatever looks good)
    steps:
      - instruction: Chop all the vegetables into large chunks
      - instruction: Place the vegetables in instant pot and cover with water
      - instruction: Cook at pressure for 45 minutes, with natural release
      - instruction: Strain the vegetables, reserving the liquid as vegetable stock.
    storage: Store vegetable stock in an airtight container in the refrigerator for up to 1 week.

  - name: make-veloute
    description: Make Velouté
    follows:
      - make-stock
    steps:
      - instruction: Pre-heat oven to 400°F
      - instruction: Toss the onion and celeriac cubes in neutral oil and salt, distribute evenly on sheet pan
        equipment:
          - half sheet pan
        ingredients:
          - name: Kosher Salt
          - name: neutral oil
            qty: 1
            unit: tablespoon
          - name: celery root
            preparation: cleaned, peeled and cut into relatively equal cubes
            unit: count
            qty: 1
          - name: sweet onion, large
            preparation: cut into quarters
            unit: count
            qty: 1/2
      - instruction: Place in the oven and roast until tender and lightly browned at the edges, about 30 to 40 minutes.
      - instruction: Add the EVOO to a small ramekin and place the garlic cut side down. Salt with sea salt. Cover with aluminum foil and bake with the rest of the vegetables until cloves are soft and lightly golden, about 35–45 minutes.
        equipment:
          - aluminum foil
        ingredients:
          - name: garlic head, small
            preparation: bottom chopped off and excess skin removed
            unit: count
            qty: 1
          - name: extra virgin olive oil
            qty: 3
            unit: tablespoon
      - instruction: In a saucepan, melt butter over medium heat. Add flour and cook, stirring, until a pale blond roux forms and smells lightly nutty.
        ingredients:
          - name: butter
            qty: 2
            unit: tablespoon
          - name: all-purpose flour
            qty: 2
            unit: tablespoon
      - instruction: Gradually whisk in warm vegetable stock and simmer for 10 to 15 minutes to form a smooth velouté base.
        ingredients:
          - name: vegetable stock
            homemade: true
            qty: 3
            unit: cup
      - instruction: Add the roasted vegetables and garlic (with oil) to the velouté base and simmer gently for 5 to 10 minutes.
      - instruction: Transfer the mixture to a high speed blender and blend until completely smooth, adding additional vegetable stock as needed to reach a silky, pourable consistency.
        equipment:
          - high speed blender
      - instruction: Press through a fine sieve to make sure your soup is very creamy
        equipment:
          - fine sieve
      - instruction: Season with salt and pepper to taste.
        ingredients:
          - name: Kosher Salt
          - name: Pepper
      - instruction: Add lemon juice to taste (start with 1/2 teaspoon)
        ingredients:
          - name: lemon juice, fresh
            qty: 1
            unit: teaspoon
            note: to taste
    storage: Store soup in an airtight container in the refrigerator for up to 1 week.

  - description: Service
    final: true
    follows:
      - make-veloute
    ingredients:
      - name: chili oil
    steps:
      - instruction: Reheat the soup
      - instruction: Taste and adjust seasoning if needed before serving
        ingredients:
          - name: lemon juice, fresh
          - name: Kosher Salt
          - name: Pepper
      - instruction: Serve in a small shooter glass with a drizzle of chili oil on top
