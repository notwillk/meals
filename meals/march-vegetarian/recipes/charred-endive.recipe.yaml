name: Charred endive with balsamic glaze
phases:
  - name: Plating
    description: Make vegetable stock
    ingredients:
      - name: endive
        qty: 3
        unit: count
      - name: Aceto Balsamico di Modena (IGP)
        qty: 1
        unit: teaspoon
      - name: neutral oil
        qty: 1
        unit: teaspoon
      - name: Maldon salt
    steps:
      - instruction: Halve endive lengthwise
      - instruction: Lightly oil the cut face
      - instruction: In cast iron skillet on medium heat, sear cut-side down until deeply golden with some blistering, ~2–4 minutes
      - instruction: Let it cool 1–2 minutes
      - instruction: Brush very lightly with IGP balsamic
      - instruction: Finish with Maldon salt
      - instruction: Serve immediately in appetizer dish
