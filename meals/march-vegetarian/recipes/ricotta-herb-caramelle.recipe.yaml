name: Ricotta & Herb Caramelle
inspiration:
  - https://www.theburntbuttertable.com/creamy-mushroom-pasta-with-olives
  - https://pastaevangelists.com/blogs/blog/caramelle-recipe
  - https://www.greatitalianchefs.com/recipes/herb-and-ricotta-ravioli-recipe
phases:
  - name: make-dough
    description: Make pasta dough
    ingredients:
      - name: 00 flour
        qty: 14 1/8
        unit: ounce
      - name: eggs
        qty: 4
        unit: count
      - name: salt
    steps:
      - instruction: Mix together the eggs, flour and a pinch of salt using volcano method
      - instruction: Knead the dough for about 10 minutes until smooth and elastic
      - instruction: Wrap in plastic wrap and let rest for 30 minutes
    storage: Wrap pasta dough in plastic wrap and store in the refrigerator for up to 2 days
  - name: make-filling
    description: Make filling
    ingredients:
      - name: Parmesan, grated
        qty: 5 1/3
        unit: ounce
      - name: Ricotta
        qty: 14 1/8
        unit: ounce
      - name: Basil, rosemary and oregano
        qty: 1 3/4
        unit: ounce
      - name: Egg, large
        qty: 1
        unit: count
      - name: Nutmeg
        qty: 1
        unit: pinch
      - name: Butter, melted
        qty: 1
        unit: tablespoon
    steps:
      - instruction: Blanch the herbs in boiling water, chill immediately in an ice bath
      - instruction: Drain them
      - instruction: Mix with a little melted butter
      - instruction: Finely chop and mix with the remaining ingredients
    storage: Store filling in an airtight container in the refrigerator for up to 2 days
  - name: make-caramelles
    description: Assemble caramelles
    follows:
      - make-dough
      - make-filling
    steps:
      - instruction: Allow dough to return to room temperature
      - instruction: Divide it into two pieces
      - instruction: Roll out each piece of dough into a thin sheet (you should be able to see your hand through it)
      - instruction: Place small spoonfuls of filling on one sheet, spacing them evenly
      - instruction: Fill and shape the Caramelles
    storage: Store assembled caramelles in an airtight container in the refrigerator, use same day
  - name: make-sauce
    description: Make Mushroom Cream Sauce
    ingredients:
      - name: Cremini Mushrooms
      - name: White wine (Sauvignon Blanc or Pinot Gris)
      - name: Fresh Herbs, thyme and rosemary
      - name: Parmesan Cheese
      - name: Cream
    steps:
      - instruction: Brown the mushrooms in a large skillet over a medium-high heat until golden brown. Leave them alone after tossing in the oil and butter, turning only once or twice. Turn the heat down if browning too quick
      - instruction: Turn down to a medium heat and add the herbs and garlic and a big pinch of salt. Let it cook for a minute
      - instruction: Add the wine and let it reduce slightly for 2-3 minutes. Scrape up any brown bits from the bottom of the pan
      - instruction: Add the cream and bring to a very gentle simmer. Turn the heat down to a low heat, it should barely be bubbling
      - instruction: Push the mushrooms to one side and add the parmesan cheese in 2 or 3 seperate lots, letting it melt in between. Add the black pepper
    storage: Store sauce in an airtight container in the refrigerator, use same day
  - description: Plating
    final: true
    ingredients:
      - name: Lemon juice
    follows:
      - make-caramelles
      - make-sauce
    steps:
      - instruction: Boil the caramelles in salted water until they float to the top, about 3-4 minutes
      - instruction: Reheat mushroom cream sauce in saute pan over low heat
      - instruction: Add a splash of lemon juice and whisk in quickly
      - instruction: Add the drained caramelles to the reheated mushroom cream sauce and toss gently to coat
      - instruction: Serve the caramelles coated in the mushroom cream sauce immediately
