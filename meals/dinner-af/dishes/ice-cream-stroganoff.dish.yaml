id: ice-cream-stroganoff
description: Ice Cream Stroganoff

yield:
  qty: 5
  unit: servings

components:
  - id: choux-ball
    description: Neutral Choux Balls (profiteroles)
    preparations:
      - id: make-choux-balls
        description: Prepare savory choux balls
        time: "2026-04-18T14:00:00"
        duration: PT45M
        steps:
          - instruction: Combine water, milk, butter, and salt in saucepan
            ingredients:
              - name: water
                qty: 120
                unit: gram
              - name: whole milk
                qty: 60
                unit: gram
              - name: butter
                qty: 90
                unit: gram
              - name: kosher salt
                qty: 3
                unit: gram
              - name: white pepper
                qty: 1
                unit: gram
                note: optional
              - name: mustard powder
                qty: 0.5
                unit: gram
                note: optional
            equipment:
              - medium saucepan
          - instruction: Bring to full boil over medium-high heat
          - instruction: Remove from heat, add flour all at once, stir vigorously with wooden spoon until cohesive dough forms
            ingredients:
              - name: all-purpose flour
                qty: 120
                unit: gram
            equipment:
              - wooden spoon or spatula
          - instruction: Return to medium heat, cook 2-3 minutes stirring constantly until dough dries and pulls away from sides of pan
            note: Dough should film bottom of pan slightly; this is critical for structure
          - instruction: Transfer to stand mixer or bowl, cool 2-3 minutes until warm but not hot (approximately 60 degrees C)
            equipment:
              - stand mixer with paddle or mixing bowl
          - instruction: Add eggs gradually, beating between additions, until dough forms smooth ribbon (V-shape) when lifted
            ingredients:
              - name: eggs
                qty: 200
                unit: gram
                note: 3-4 large eggs; quantity may vary; add until ribbon stage reached
            equipment:
              - stand mixer or hand mixer
          - instruction: Transfer dough to piping bag fitted with 1.5cm round tip
            equipment:
              - piping bag
              - 1.5cm round piping tip
          - instruction: Pipe 5-6 cm mounds (approximately 2.5-3 cm tall) on parchment-lined baking sheet, leaving 5cm space between each
            note: Creates profiterole-sized balls; smooth tops with wet finger if needed
            equipment:
              - baking sheet
              - parchment paper
          - instruction: Bake at 190 degrees C (375 degrees F) for 20 minutes
            note: Do not open oven door during first 20 minutes or choux will collapse
            equipment:
              - oven
          - instruction: Reduce heat to 160 degrees C (320 degrees F), bake 15-25 minutes more until dry, light golden, and firm
            note: Rotate pan if browning unevenly; choux should sound hollow when tapped
          - instruction: Turn oven off, crack door open 10-15 cm, let cool in oven 10-15 minutes
            note: Prevents collapse from thermal shock
          - instruction: Remove from oven, cool completely on wire rack
            equipment:
              - wire cooling rack
        storage: Room temperature in airtight container with paper towel up to 2 days; rewarm at 160 degrees C for 5-8 minutes before service

  - id: stroganoff-ice-cream
    description: Stroganoff Ice Cream (kombu milk + duxelles custard)
    preparations:
      - id: make-kombu-milk
        description: Prepare kombu-infused milk base
        time: "2026-04-16T16:00:00"
        duration: PT1H
        steps:
          - instruction: Combine 150g milk with kombu in sous vide bag or heat-safe container
            ingredients:
              - name: whole milk
                qty: 150
                unit: gram
              - name: kombu (dried kelp)
                qty: 4
                unit: gram
            equipment:
              - sous vide bag or heat-safe container
          - instruction: Sous vide at 60-65 degrees C for 45-60 minutes
            note: Alternative without sous vide - heat milk with kombu to 60-65 degrees C in double boiler, maintain temperature 45-60 minutes, monitoring with thermometer
            equipment:
              - sous vide circulator or double boiler and thermometer
          - instruction: Remove kombu when subtle oceanic flavor is achieved (not fishy or overpowering)
          - instruction: Combine infused milk with remaining 150g milk
            ingredients:
              - name: whole milk
                qty: 150
                unit: gram

      - id: make-duxelles
        description: Cook duxelles for ice cream base
        time: "2026-04-16T17:00:00"
        duration: PT30M
        steps:
          - instruction: Finely chop mushrooms to near-paste consistency (food processor or knife)
            ingredients:
              - name: mushrooms
                qty: 150
                unit: gram
            equipment:
              - food processor or knife and cutting board
          - instruction: Cook mushrooms with butter and salt over medium heat, stirring frequently, until fully dry and slightly glossy
            ingredients:
              - name: butter
                qty: 15
                unit: gram
                note: required for flavor integration and fat balance; do not omit
              - name: kosher salt
                qty: 2
                unit: gram
            note: Mushrooms must release all moisture and reduce to approximately 50g dry paste; final duxelles should be spreadable and nearly dry with no visible free moisture; use all of this in the base; approximately 15-20 minutes
            equipment:
              - saute pan
              - spatula
          - instruction: Cool completely before adding to ice cream base

      - id: make-stroganoff-ice-cream
        description: Prepare savory custard base with duxelles, split for dual texture approach
        time: "2026-04-16T18:00:00"
        duration: PT4H
        follows:
          - make-kombu-milk
          - make-duxelles
        steps:
          - instruction: Pre-mix xanthan gum with sugar to prevent clumping
            ingredients:
              - name: granulated sugar
                qty: 40
                unit: gram
                note: intentionally low; supports freezing while minimizing sweetness
              - name: xanthan gum
                qty: 0.8
                unit: gram
                note: optional but recommended; keep at or below approximately 0.12 percent of total base to avoid slimy texture
            equipment:
              - small bowl
              - whisk
          - instruction: Combine kombu milk, heavy cream, and duxelles in saucepan, heat to steaming (70-75 degrees C)
            ingredients:
              - name: heavy cream
                qty: 300
                unit: gram
              - name: duxelles
                qty: 50
                unit: gram
            equipment:
              - medium saucepan
              - thermometer
          - instruction: With immersion blender running, create vortex and slowly sprinkle xanthan-sugar mixture into liquid
            note: Blend for at least 30 seconds until fully dispersed; vortex method prevents clumping
            equipment:
              - immersion blender
              - tall narrow container
          - instruction: Whisk egg yolks in separate bowl until smooth
            ingredients:
              - name: eggs
                qty: 90
                unit: gram
            equipment:
              - mixing bowl
              - whisk
          - instruction: Temper yolks by slowly adding one-third of hot dairy mixture while whisking constantly
            note: Prevents curdling; add gradually, whisk vigorously
          - instruction: Return tempered yolks to saucepan with remaining dairy, cook over medium-low heat stirring constantly until 82-84 degrees C (nappe consistency)
            note: Custard should coat back of spoon, leave trail when finger drawn through; do not boil or curdle
            equipment:
              - wooden spoon or spatula
              - thermometer
          - instruction: Remove from heat immediately, add crème fraîche, fish sauce, soy sauce, MSG, mustard, and salt
            ingredients:
              - name: crème fraîche
                qty: 170
                unit: gram
              - name: vegan fish sauce
                qty: 3.5
                unit: gram
              - name: white soy sauce
                qty: 6.5
                unit: gram
              - name: MSG (monosodium glutamate)
                qty: 0.65
                unit: gram
              - name: Dijon mustard
                qty: 4
                unit: gram
              - name: kosher salt
                qty: 1.8
                unit: gram
                note: adjust after tasting; soy sauce and vegan fish sauce contribute salt
            note: Stir until completely incorporated
          - instruction: Taste base warm and adjust seasoning
            note: Target flavor is savory, tangy cream; no single element (soy, fish sauce, mushroom) should be identifiable; slightly over-seasoned warm is correct as freezing dulls flavor
          - instruction: Strain through fine mesh sieve into clean container (optional but recommended for smooth texture)
            equipment:
              - fine mesh strainer
              - storage container
          - instruction: Chill rapidly in ice bath, then refrigerate at least 4 hours or preferably overnight
            note: Base must be completely cold before churning for optimal texture
            equipment:
              - ice bath
              - refrigerator
          - instruction: Churn in traditional ice cream maker according to manufacturer's instructions until soft-serve consistency
            equipment:
              - ice cream maker
            note: Traditional machine produces classic ice cream texture
          - instruction: Divide churned ice cream evenly between two freezer-safe containers
            note: Split for dual texture approach — one for Ninja Creami superfine processing, one for traditional texture
          - instruction: Transfer one portion to Ninja Creami pint container, freeze until solid (level with lid, do not overfill)
            note: This is the Creami batch — must freeze solid overnight before processing
            equipment:
              - Ninja Creami pint container with lid
          - instruction: Transfer second portion to standard freezer-safe container, press parchment directly to surface to prevent ice crystals, freeze until scoopable
            note: This is the traditional batch — standard ice cream texture
            equipment:
              - freezer-safe container with parchment
        storage: Frozen with parchment pressed to surface (traditional) or in Creami pint (Creami batch); best 1-3 days, up to 1 week with xanthan stabilization

      - id: process-creami-ice-cream
        description: Process Creami batch through Ninja Creami for superfine texture (next day)
        time: "2026-04-17T10:00:00"
        duration: PT15M
        follows:
          - make-stroganoff-ice-cream
        steps:
          - instruction: Remove frozen Creami pint from freezer and check that ice cream is solid throughout
            note: Must be frozen solid overnight (minimum 24 hours for best results)
          - instruction: Install pint into Ninja Creami outer bowl with paddle attachment
            equipment:
              - Ninja Creami machine
              - Creami paddle attachment (spoon-shaped)
          - instruction: Lock lid in place and select "Ice Cream" program
            note: Program runs approximately 2 minutes
          - instruction: After cycle completes, check texture — should be superfine, smooth, and creamy
            note: If texture is crumbly, respin using "Re-Spin" function; if too soft, add small amount of liquid (milk or cream) and respin
          - instruction: Scoop processed superfine ice cream into serving container or hold briefly
            note: Creami texture is best served immediately after processing; if holding, refreeze 10-15 minutes maximum
        storage: Process immediately before service; hold maximum 15 minutes before texture degrades

  - id: filet-mignon
    description: Filet Mignon Cubes (garnish)
    preparations:
      - id: sous-vide-filet-mignon
        description: Sous vide filet mignon cubes to medium rare
        time: "2026-04-18T14:00:00"
        duration: PT1H30M
        steps:
          - instruction: Dice filet mignon into approximately 1 cm cubes
            ingredients:
              - name: filet mignon
                qty: 400
                unit: gram
            equipment:
              - knife
              - cutting board
          - instruction: Season cubes lightly with kosher salt
            ingredients:
              - name: kosher salt
                qty: 3
                unit: gram
                note: to taste
            note: Light seasoning now; will season again after searing
          - instruction: Place cubes in sous vide bag in single layer, vacuum seal
            equipment:
              - sous vide bags
              - vacuum sealer
            note: Do not overcrowd; use multiple bags if necessary for even cooking
          - instruction: Sous vide at 130°F (54°C) for 45-60 minutes until uniformly medium rare
            equipment:
              - sous vide circulator
              - water bath container
            note: 130°F produces perfect medium rare; cubes cook quickly due to small size
          - instruction: Remove from water bath, pat cubes thoroughly dry with paper towels
            equipment:
              - paper towels
            note: Critical step - beef must be completely dry before searing to develop crust
          - instruction: Hold at room temperature or refrigerate until ready to sear (up to 2 hours)
        storage: Refrigerate sealed bag up to 2 days; bring to room temperature before searing

      - id: sear-filet-mignon
        description: Pan sear sous vide beef cubes for crust
        time: "2026-04-18T17:30:00"
        duration: PT15M
        follows:
          - sous-vide-filet-mignon
        steps:
          - instruction: Remove sous vide beef from bag, pat extremely dry with paper towels
            equipment:
              - paper towels
            note: Moisture is the enemy of browning; be thorough
          - instruction: Heat heavy pan (cast iron or stainless steel) with neutral oil over high heat until nearly smoking
            ingredients:
              - name: neutral oil (grapeseed or canola)
                qty: 15
                unit: gram
            equipment:
              - heavy saute pan or cast iron skillet
          - instruction: Sear cubes in small batches without crowding, 30-45 seconds per side until deep brown crust forms
            note: Sous vide beef is already cooked; searing is purely for crust development. High heat, quick sear, do not overcook.
          - instruction: Season immediately with flaky or kosher salt upon removing from pan
            ingredients:
              - name: kosher salt
                qty: 2
                unit: gram
                note: to taste
            note: Season while hot so salt adheres
          - instruction: Optional - for last batch, add butter and brandy to deglaze, creating light pan sauce to drizzle over beef
            ingredients:
               - name: butter
                 qty: 20
                 unit: gram
                 note: optional
               - name: brandy or cognac
                 qty: 15
                 unit: ml
                 note: optional
            note: Be careful of flare-up when adding alcohol to hot pan; light glazing with reduced pan juices improves integration with cream elements
          - instruction: Hold beef cubes warm (not hot) until assembly
            note: Approximately 50-55°C; do not hold hot or carryover will overcook
        storage: Best used immediately after searing; if necessary hold loosely covered at room temperature up to 30 minutes

  - id: service
    description: Final Assembly & Service
    preparations:
      - id: assemble-stroganoff
        description: Assemble ice cream stroganoff with temperature contrast
        time: "2026-04-18T17:55:00"
        duration: PT15M
        final: true
        follows:
           - make-choux-balls
           - make-stroganoff-ice-cream
           - process-creami-ice-cream
           - make-creme-fraiche-syrup
           - sear-filet-mignon
        steps:
           - instruction: Reheat choux balls if necessary - place in 160 degrees C oven for 5-8 minutes until warm and crisp
             note: Choux should be warm for optimal contrast
             equipment:
               - oven
           - instruction: Using a serrated knife, cut the top 1/3 off each choux ball to create a lid
             note: Cut horizontally with a sawing motion; reserve lids for garnish or discard
             equipment:
               - serrated knife
           - instruction: Lightly brush interior of choux ball with melted butter just before plating
             note: Enhances aroma and helps integrate melting ice cream into base
           - instruction: Place warm choux ball (bottom portion) centered on serving plate
           - instruction: Scatter filet mignon cubes into and around the choux ball
             note: Beef should be warm, approximately 50-55 degrees C
           - instruction: Using warm spoon dipped in hot water, form quenelle of ice cream and place slightly off-center on plate
             note: Ice cream should be cold and scoopable but not rock-hard; temper 3-5 minutes before scooping if needed
             equipment:
             - warm spoon
           - instruction: Serve immediately with temperature contrast intact
             note: Target - choux warm, beef warm, ice cream cold, syrup cool; reads as dessert, eats as stroganoff