id: ice-cream-stroganoff
description: Ice Cream Stroganoff

yield:
  qty: 5
  unit: servings

components:
  - id: choux-ring
    description: Neutral Choux Ring (base)
    preparations:
      - id: make-choux-ring
        description: Prepare savory choux ring base
        duration: PT45M
        steps:
          - instruction: Combine water, milk, butter, and salt in saucepan
            ingredients:
              - name: water
                qty: 120
                unit: gram
              - name: whole milk
                qty: 60
                unit: gram
              - name: butter
                qty: 90
                unit: gram
              - name: fine salt
                qty: 3
                unit: gram
              - name: white pepper
                qty: 1
                unit: gram
                note: optional
              - name: mustard powder
                qty: 0.5
                unit: gram
                note: optional
            equipment:
              - medium saucepan
          - instruction: Bring to full boil over medium-high heat
          - instruction: Remove from heat, add flour all at once, stir vigorously with wooden spoon until cohesive dough forms
            ingredients:
              - name: all-purpose flour
                qty: 120
                unit: gram
            equipment:
              - wooden spoon or spatula
          - instruction: Return to medium heat, cook 2-3 minutes stirring constantly until dough dries and pulls away from sides of pan
            note: Dough should film bottom of pan slightly; this is critical for structure
          - instruction: Transfer to stand mixer or bowl, cool 2-3 minutes until warm but not hot (approximately 60 degrees C)
            equipment:
              - stand mixer with paddle or mixing bowl
          - instruction: Add eggs gradually, beating between additions, until dough forms smooth ribbon (V-shape) when lifted
            ingredients:
              - name: eggs
                qty: 200
                unit: gram
                note: 3-4 large eggs; quantity may vary; add until ribbon stage reached
            equipment:
              - stand mixer or hand mixer
          - instruction: Transfer dough to piping bag fitted with 1cm round tip
            equipment:
              - piping bag
              - 1cm round piping tip
          - instruction: Pipe 10-12 cm ring (approximately 1-1.5 cm thick) on parchment-lined baking sheet, overlap seam and smooth with wet finger
            note: Orient seam at 6 o'clock during service or cover with garnish if visible
            equipment:
              - baking sheet
              - parchment paper
          - instruction: Bake at 190 degrees C (375 degrees F) for 20 minutes
            note: Do not open oven door during first 20 minutes or choux will collapse
            equipment:
              - oven
          - instruction: Reduce heat to 160 degrees C (320 degrees F), bake 15-25 minutes more until dry, light golden, and firm
            note: Rotate pan if browning unevenly; choux should sound hollow when tapped
          - instruction: Turn oven off, crack door open 10-15 cm, let cool in oven 10-15 minutes
            note: Prevents collapse from thermal shock
          - instruction: Remove from oven, cool completely on wire rack
            equipment:
              - wire cooling rack
        storage: Room temperature in airtight container with paper towel up to 2 days; rewarm at 160 degrees C for 5-8 minutes before service

  - id: stroganoff-ice-cream
    description: Stroganoff Ice Cream (kombu milk + duxelles custard)
    preparations:
      - id: make-kombu-milk
        description: Prepare kombu-infused milk base
        duration: PT1H
        steps:
          - instruction: Combine 150g milk with kombu in sous vide bag or heat-safe container
            ingredients:
              - name: whole milk
                qty: 150
                unit: gram
              - name: kombu (dried kelp)
                qty: 4
                unit: gram
            equipment:
              - sous vide bag or heat-safe container
          - instruction: Sous vide at 60-65 degrees C for 45-60 minutes
            note: Alternative without sous vide - heat milk with kombu to 60-65 degrees C in double boiler, maintain temperature 45-60 minutes, monitoring with thermometer
            equipment:
              - sous vide circulator or double boiler and thermometer
          - instruction: Remove kombu when subtle oceanic flavor is achieved (not fishy or overpowering)
          - instruction: Combine infused milk with remaining 150g milk
            ingredients:
              - name: whole milk
                qty: 150
                unit: gram

      - id: make-duxelles
        description: Cook duxelles for ice cream base
        duration: PT30M
        steps:
          - instruction: Finely chop mushrooms to near-paste consistency (food processor or knife)
            ingredients:
              - name: mushrooms (cremini or button)
                qty: 150
                unit: gram
            equipment:
              - food processor or knife and cutting board
          - instruction: Cook mushrooms with butter and salt over medium heat, stirring frequently, until fully dry and slightly glossy
            ingredients:
              - name: butter
                qty: 15
                unit: gram
                note: required for flavor integration and fat balance; do not omit
              - name: fine salt
                qty: 2
                unit: gram
            note: Mushrooms must release all moisture and reduce to approximately 50g dry paste; final duxelles should be spreadable and nearly dry with no visible free moisture; use all of this in the base; approximately 15-20 minutes
            equipment:
              - saute pan
              - spatula
          - instruction: Cool completely before adding to ice cream base

      - id: make-stroganoff-ice-cream
        description: Prepare savory custard base with stabilization
        duration: PT4H
        follows:
          - make-kombu-milk
          - make-duxelles
        steps:
          - instruction: Pre-mix xanthan gum with sugar to prevent clumping
            ingredients:
              - name: granulated sugar
                qty: 40
                unit: gram
                note: intentionally low; supports freezing while minimizing sweetness
              - name: xanthan gum
                qty: 0.8
                unit: gram
                note: optional but recommended; keep at or below approximately 0.12 percent of total base to avoid slimy texture
            equipment:
              - small bowl
              - whisk
          - instruction: Combine kombu milk, heavy cream, and duxelles in saucepan, heat to steaming (70-75 degrees C)
            ingredients:
              - name: heavy cream
                qty: 300
                unit: gram
              - name: duxelles
                qty: 50
                unit: gram
            equipment:
              - medium saucepan
              - thermometer
          - instruction: With immersion blender running, create vortex and slowly sprinkle xanthan-sugar mixture into liquid
            note: Blend for at least 30 seconds until fully dispersed; vortex method prevents clumping
            equipment:
              - immersion blender
              - tall narrow container
          - instruction: Whisk egg yolks in separate bowl until smooth
            ingredients:
              - name: egg yolks
                qty: 90
                unit: gram
            equipment:
              - mixing bowl
              - whisk
          - instruction: Temper yolks by slowly adding one-third of hot dairy mixture while whisking constantly
            note: Prevents curdling; add gradually, whisk vigorously
          - instruction: Return tempered yolks to saucepan with remaining dairy, cook over medium-low heat stirring constantly until 82-84 degrees C (nappe consistency)
            note: Custard should coat back of spoon, leave trail when finger drawn through; do not boil or curdle
            equipment:
              - wooden spoon or spatula
              - thermometer
          - instruction: Remove from heat immediately, add crème fraîche, fish sauce, soy sauce, MSG, mustard, and salt
            ingredients:
              - name: crème fraîche
                qty: 170
                unit: gram
              - name: vegan fish sauce
                qty: 3.5
                unit: gram
              - name: white soy sauce
                qty: 6.5
                unit: gram
              - name: MSG (monosodium glutamate)
                qty: 0.65
                unit: gram
              - name: Dijon mustard
                qty: 4
                unit: gram
              - name: fine salt
                qty: 1.8
                unit: gram
                note: adjust after tasting; soy sauce and vegan fish sauce contribute salt
            note: Stir until completely incorporated
          - instruction: Taste base warm and adjust seasoning
            note: Target flavor is savory, tangy cream; no single element (soy, fish sauce, mushroom) should be identifiable; slightly over-seasoned warm is correct as freezing dulls flavor
          - instruction: Strain through fine mesh sieve into clean container (optional but recommended for smooth texture)
            equipment:
              - fine mesh strainer
              - storage container
          - instruction: Chill rapidly in ice bath, then refrigerate at least 4 hours or preferably overnight
            note: Base must be completely cold before churning for optimal texture
            equipment:
              - ice bath
              - refrigerator
          - instruction: Churn in ice cream maker according to manufacturer's instructions until soft-serve consistency
            equipment:
              - ice cream maker
          - instruction: Transfer to freezer-safe container, press parchment directly to surface to prevent ice crystals, freeze until scoopable
            note: Ice cream should soften quickly and melt into sauce; if too firm, allow additional tempering before service
        storage: Frozen in airtight container with parchment pressed to surface; best 1-3 days, up to 1 week with xanthan stabilization

  - id: creme-fraiche-syrup
    description: Crème Fraîche "Syrup" (acid element)
    preparations:
      - id: make-creme-fraiche-syrup
        description: Prepare stabilized acidic syrup
        duration: PT30M
        steps:
          - instruction: Pre-mix xanthan gum with sugar for even dispersion
            ingredients:
              - name: granulated sugar
                qty: 25
                unit: gram
              - name: xanthan gum
                qty: 0.6
                unit: gram
                note: optional but recommended; prevents separation in acidic environment
            equipment:
              - small bowl
          - instruction: Combine crème fraîche, vinegar, and salt in container, whisk until smooth
            ingredients:
              - name: crème fraîche
                qty: 200
                unit: gram
              - name: white wine vinegar
                qty: 20
                unit: gram
                note: or champagne vinegar; adjust to taste between 15-25g
              - name: fine salt
                qty: 2
                unit: gram
            equipment:
              - mixing bowl
              - whisk
          - instruction: With immersion blender running, slowly sprinkle xanthan-sugar mixture into crème fraîche mixture, blend 1-2 minutes until completely smooth
            note: Blend until glossy and uniform; acidic medium requires thorough incorporation
            equipment:
              - immersion blender
          - instruction: Rest at room temperature 15-30 minutes to allow full hydration and stabilization
            note: Syrup will thicken slightly as it rests; final texture should be slow-flowing and glossy (nappe), coating a spoon and holding a clean drizzle; should read as sour cream, not vinegar
          - instruction: Strain through fine mesh sieve into squeeze bottle or airtight container
            note: Ensures smooth, lump-free consistency for drizzling
            equipment:
              - fine mesh strainer
              - squeeze bottle or storage container
        storage: Refrigerated in squeeze bottle or airtight container up to 4 days; shake or stir before use, adjust viscosity if needed

  - id: filet-mignon
    description: Filet Mignon Cubes (garnish)
    preparations:
      - id: cook-filet-mignon
        description: Sear beef cubes for garnish
        duration: PT20M
        steps:
          - instruction: Dice filet mignon into approximately 1 cm cubes
            ingredients:
              - name: filet mignon
                qty: 400
                unit: gram
            equipment:
              - knife
              - cutting board
          - instruction: Pat cubes thoroughly dry with paper towels; moisture prevents proper searing
            note: Critical step - beef must be completely dry
            equipment:
              - paper towels
          - instruction: Heat heavy pan with neutral oil over high heat until nearly smoking
            ingredients:
              - name: neutral oil (grapeseed or canola)
                qty: 15
                unit: gram
            equipment:
              - heavy saute pan or cast iron skillet
          - instruction: Sear cubes in small batches (do not crowd pan) until browned on all sides, interior rare to medium-rare
            note: Approximately 1-2 minutes per batch; high heat is essential; remove slightly under desired doneness as carryover heat will continue cooking
          - instruction: Salt immediately upon removing from pan
            ingredients:
              - name: fine salt
                qty: 3
                unit: gram
                note: to taste
            note: Season while hot so salt adheres
          - instruction: Optional - for last batch, add butter and brandy to deglaze, creating light pan sauce to drizzle over beef
            ingredients:
              - name: butter
                qty: 20
                unit: gram
                note: optional
              - name: brandy or cognac
                qty: 15
                unit: ml
                note: optional
            note: Be careful of flare-up when adding alcohol to hot pan; light glazing with reduced pan juices improves integration with cream elements
          - instruction: Hold beef cubes warm (not hot) until assembly
            note: Approximately 50-55 degrees C; do not overcook during holding
        storage: Raw beef - refrigerate on tray lined with paper towel, loosely covered, up to 24 hours; Cooked beef - not ideal, but may refrigerate in airtight container up to 1 day and gently rewarm

  - id: service
    description: Final Assembly & Service
    preparations:
      - id: assemble-stroganoff
        description: Assemble ice cream stroganoff with temperature contrast
        duration: PT15M
        final: true
        follows:
          - make-choux-ring
          - make-stroganoff-ice-cream
          - make-creme-fraiche-syrup
          - cook-filet-mignon
        steps:
          - instruction: Reheat choux ring if necessary - place in 160 degrees C oven for 5-8 minutes until warm and crisp
            note: Choux should be warm for optimal contrast
            equipment:
              - oven
          - instruction: Lightly brush interior of choux ring with melted butter just before plating
            note: Enhances aroma and helps integrate melting ice cream into base
          - instruction: Place warm choux ring centered on serving plate
          - instruction: Optional - add milk gel "noodles" loosely inside choux ring if using
            note: Milk gel noodles (lightly buttered) are optional component for texture play
          - instruction: Scatter filet mignon cubes over noodles and partially on choux ring
            note: Beef should be warm, approximately 50-55 degrees C
          - instruction: Using warm spoon dipped in hot water, form quenelle of ice cream and place slightly off-center on plate
            note: Ice cream should be cold and scoopable but not rock-hard; temper 3-5 minutes before scooping if needed
            equipment:
              - warm spoon
          - instruction: Drizzle crème fraîche syrup across ice cream and noodles in artistic pattern, add a few dots to plate
            note: Syrup should be cool or room temperature; approximately 15-20ml per plate
          - instruction: Optional - garnish with fine chives or dill for fresh contrast and visual color
            ingredients:
              - name: fresh chives
                qty: 1
                unit: gram
                note: finely chopped; optional
              - name: fresh dill
                qty: 1
                unit: gram
                note: optional
          - instruction: Serve immediately with temperature contrast intact
            note: Target - choux warm, beef warm, noodles neutral/warm, ice cream cold, syrup cool; reads as dessert, eats as stroganoff