id: watermelon-tartar
description: Watermelon Tartar

yield:
  qty: 5
  unit: servings

components:
  - id: watermelon-tartar-base
    description: Watermelon Tartar Base
    preparations:
      - id: prep-watermelon-tartar
        description: Prepare watermelon tartar to mimic raw tuna
        time: "2026-04-18T10:00:00"
        duration: PT1H
        steps:
          - instruction: Trim rind from seedless watermelon; cut flesh into 6mm dice
            ingredients:
              - name: watermelon, seedless
                qty: 400
                unit: gram
                preparation: trimmed, 6mm dice
            equipment:
              - knife
              - cutting board
          - instruction: Season diced watermelon with salt, lime zest, and light soy sauce
            ingredients:
              - name: kosher salt
                qty: 2
                unit: gram
              - name: lime zest
                qty: 1
                unit: lime
                preparation: from 1 lime
              - name: soy sauce, light
                qty: 5
                unit: ml
            equipment:
              - microplane
              - bowl
          - instruction: Vacuum seal on high pressure to compress and intensify texture
            equipment:
              - vacuum sealer
              - vacuum bags
          - instruction: Rest chilled for 30-60 minutes
            note: Compression firms texture and concentrates flavor
        storage: Refrigerate up to 4 hours

  - id: black-garlic-dashi-caviar
    description: Black Garlic Dashi Caviar
    preparations:
      - id: make-dashi-caviar
        description: Create spherified black garlic dashi pearls
        time: "2026-04-17T11:00:00"
        duration: PT2H
        steps:
          - instruction: Combine kombu and water in a saucepan, let soak for 20 minutes
            ingredients:
              - name: kombu
                qty: 5
                unit: gram
              - name: water
                qty: 120
                unit: ml
          - instruction: Heat gently to 70°C (160°F), remove from heat
          - instruction: Add dried shiitake mushrooms, steep for 5 minutes
            ingredients:
              - name: dried shiitake mushrooms
                qty: 10
                unit: gram
          - instruction: Strain dashi through fine mesh strainer, reserve liquid
            equipment:
              - fine mesh strainer
          - instruction: Blend black garlic into dashi until smooth
            ingredients:
              - name: black garlic
                qty: 2
                unit: clove
            equipment:
              - immersion blender
          - instruction: Strain again through fine mesh strainer
            equipment:
              - fine mesh strainer
            note: Dashi should be smooth with no bits
          - instruction: Weigh finished dashi and ensure it is cold (below 10°C / 50°F)
            note: Required for correct hydrocolloid hydration and ratio calculations
          - instruction: Add sodium citrate (0.75% of total dashi weight) and blend until fully dissolved
            ingredients:
              - name: sodium citrate
            note: Buffers the liquid for reliable spherification
          - instruction: Weigh sodium alginate (0.5% of total dashi weight)
            ingredients:
              - name: sodium alginate
            note: If pearls float or deform, increase slightly to ~0.6%
          - instruction: Sprinkle sodium alginate onto dashi while blending with immersion blender
            equipment:
              - immersion blender
          - instruction: Continue blending until fully dispersed, about 2-3 minutes
          - instruction: Pass through fine mesh strainer to remove any undissolved particles
            equipment:
              - fine mesh strainer
          - instruction: Let rest in refrigerator for at least 1 hour to eliminate air bubbles
            note: Air bubbles will cause uneven membrane or weak spots
          - instruction: Prepare calcium bath — dissolve calcium chloride in distilled water (0.5% by weight)
            ingredients:
              - name: calcium chloride
              - name: distilled water
            note: Prepare at least 500g total solution
          - instruction: Prepare a second bowl with plain water for rinsing
            ingredients:
              - name: water
                qty: 100
                unit: ml
          - instruction: Fill syringe or squeeze bottle with sodium alginate dashi solution
            equipment:
              - syringe
              - squeeze bottle
              - caviar maker
            note: Use 18–22 gauge tip for caviar-sized pearls (3–4mm)
          - instruction: Hold syringe about 3 inches above calcium bath
          - instruction: Drop small amounts of solution into calcium bath, spacing them apart
            note: Pearl size depends on nozzle diameter
          - instruction: Let pearls sit in bath for 1-2 minutes
            note: Longer time = thicker membrane
          - instruction: Carefully remove pearls with slotted spoon
            equipment:
              - slotted spoon
          - instruction: Rinse pearls thoroughly in clean water to remove calcium chloride
            note: Inadequate rinsing will cause continued gelation during storage
          - instruction: Carefully transfer pearls to container with leftover dashi
            equipment:
              - airtight container
            note: Store pearls submerged in dashi to maintain texture
        storage: |
          Store pearls submerged in leftover dashi in airtight container in refrigerator.
          Best within 24 hours.

  - id: chiffonade-basil
    description: Chiffonade Basil Garnish
    preparations:
      - id: prep-basil-garnish
        description: Prepare chiffonade basil for garnish
        time: "2026-04-18T16:45:00"
        duration: PT5M
        steps:
          - instruction: Stack basil leaves and roll tightly into a cigar
            ingredients:
              - name: basil
                qty: 10
                unit: gram
            equipment:
              - knife
          - instruction: Cut crosswise into thin ribbons (chiffonade)
            note: Cut just before service to prevent browning
        storage: Keep wrapped in damp paper towel until service

  - id: plate-amuse
    description: Service
    preparations:
      - id: plate-watermelon-tartar
        description: Plate watermelon tartar amuse-bouche
        time: "2026-04-18T17:00:00"
        duration: PT5M
        final: true
        follows:
          - prep-watermelon-tartar
          - make-dashi-caviar
          - prep-basil-garnish
        steps:
          - instruction: Place small ring mold or spoon on serving plate
            equipment:
              - small ring mold or spoon
          - instruction: Fill with compressed watermelon tartar, gently pressing to form
            ingredients:
              - name: watermelon tartar
                homemade: true
            note: Approximately 40-50g per portion
          - instruction: Carefully top with black garlic dashi caviar pearls
            ingredients:
              - name: black garlic dashi caviar
                homemade: true
            note: Handle gently — pearls are delicate. Use approximately 1 tsp per portion.
          - instruction: Garnish with chiffonade basil
            ingredients:
              - name: basil
                note: chiffonade cut
          - instruction: Finish with light drizzle of high-quality olive oil (optional)
            ingredients:
              - name: olive oil
                note: optional
          - instruction: Serve immediately
            note: Ideal service window — within 10 minutes of plating
        storage: Assemble à la minute
