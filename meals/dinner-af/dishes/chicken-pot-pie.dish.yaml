id: chicken-pot-pie
description: Chicken Pot Pie

yield:
  qty: 5-6
  unit: servings

components:
  - id: chicken-stock
    description: Pressure-Cooked Chicken Stock
    preparations:
      - id: make-chicken-stock-pressure
        description: Create deeply flavorful chicken stock using pressure cooker
        time: "2026-04-16T10:00:00"
        duration: PT2H30M
        steps:
          - instruction: Preheat oven to 450°F (230°C)
            equipment:
              - oven
          - instruction: Spread chicken backs and feet on a sheet pan, roast until deeply browned (about 25-30 minutes)
            ingredients:
              - name: chicken backs
                qty: 1.6
                unit: kg
              - name: chicken feet
                qty: 1.6
                unit: kg
            note: This develops the stock's deep color and flavor; include pan drippings
          - instruction: Transfer all roasted solids and drippings to pressure cooker
            equipment:
              - pressure cooker
          - instruction: Add water to cover solids (approximately 3 liters)
            ingredients:
              - name: water
                qty: 3
                unit: liter
          - instruction: Cook on High Pressure for 60 minutes
            equipment:
              - pressure cooker
          - instruction: Allow natural pressure release
          - instruction: Strain stock through fine mesh sieve
            equipment:
              - fine mesh strainer
          - instruction: Refrigerate until ready for use
        storage: Refrigerate up to 3 days or freeze up to 1 month

  - id: rotisserie-chicken
    description: Rotisserie Chicken (Store-Bought)
    preparations:
      - id: prep-rotisserie-chicken
        description: Debone and dice rotisserie chicken
        time: "2026-04-18T16:00:00"
        duration: PT30M
        steps:
          - instruction: Purchase 1 rotisserie chicken from grocery store (approximately 3.5-4 lb / 1.5-1.8 kg)
            ingredients:
              - name: rotisserie chicken
                qty: 1
                unit: whole
                note: 3.5-4lb / 1.5-1.8kg; store-bought, fully cooked
          - instruction: Allow chicken to rest 20-30 minutes if warm, then debone
          - instruction: Remove all meat from bones, dice into 2-3cm pieces
          - instruction: Reserve 650g diced chicken for filling (save any extra for other uses)
            note: 650g is approximately all the meat from a 3.5-4lb chicken
        storage: Refrigerate up to 2 days; bring to room temperature before adding to filling

  - id: pie-filling
    description: Classic Pot Pie Filling
    preparations:
      - id: make-pie-filling
        description: Make vegetable filling with roux-based sauce
        time: "2026-04-18T17:00:00"
        duration: PT1H
        follows:
          - prep-rotisserie-chicken
        steps:
          - instruction: Preheat large heavy-bottomed pot over medium-high heat
            equipment:
              - large pot or Dutch oven
          - instruction: Add butter to pot, then add vegetables (onion, celery, carrot, leek, fennel, garlic) and large pinch of kosher salt
            ingredients:
              - name: butter
                qty: 113
                unit: gram
                note: 1 stick, unsalted
              - name: onion
                qty: 225
                unit: gram
                preparation: medium diced
                note: approximately 1 large onion
              - name: celery
                qty: 115
                unit: gram
                preparation: medium diced
                note: about 2 large ribs
              - name: carrots
                qty: 115
                unit: gram
                preparation: medium diced
                note: about 2 large carrots
              - name: leeks
                qty: 75
                unit: gram
                preparation: diced and rinsed
                note: white and light green parts
              - name: fennel
                qty: 75
                unit: gram
                preparation: medium diced
              - name: garlic
                qty: 10
                unit: gram
                preparation: minced
                note: about 3-4 cloves
              - name: kosher salt
                qty: 5
                unit: gram
                note: large pinch
          - instruction: Sweat vegetables for 5-6 minutes, stirring to combine
          - instruction: Add potatoes and continue to cook for 3 minutes
            ingredients:
              - name: yukon gold potatoes
                qty: 250
                unit: gram
                preparation: medium diced
                note: about 1-1.5 large potatoes
          - instruction: Add flour and stir to coat all vegetables
            ingredients:
              - name: all-purpose flour
                qty: 115
                unit: gram
                note: approximately 1/2 cup
          - instruction: Continue stirring frequently for 2-3 minutes to cook off raw flour taste
          - instruction: Add dry sherry and cook for about 1 minute
            ingredients:
              - name: dry sherry
                qty: 150
                unit: ml
                note: approximately 2/3 cup
          - instruction: Add chicken stock, stir well, and reduce heat to medium-low
            ingredients:
              - name: chicken stock
                qty: 900
                unit: ml
                note: approximately 4 cups; warm stock incorporates more smoothly
          - instruction: Bring to a simmer, cover, and cook 15-20 minutes until potatoes are tender
          - instruction: Once potatoes are tender, add frozen peas and diced chicken
            ingredients:
              - name: frozen peas
                qty: 140
                unit: gram
                note: approximately 1 cup
              - name: rotisserie chicken
                qty: 650
                unit: gram
                preparation: diced
                homemade: true
          - instruction: When peas and chicken are heated through (3-5 minutes), remove from heat
          - instruction: Taste for seasoning and adjust with kosher salt and plenty of black pepper
            ingredients:
              - name: kosher salt
                note: to taste
              - name: black pepper
                note: to taste; be generous
              - name: fresh thyme
                qty: 1
                unit: gram
                preparation: chopped
                note: approximately 1 teaspoon fresh thyme leaves
        storage: Use immediately for assembly; do not hold long after adding chicken

  - id: pie-crust
    description: Sour Cream Pie Crust
    preparations:
      - id: make-pie-crust
        description: Make pie crust with sour cream in food processor
        time: "2026-04-18T14:00:00"
        duration: PT45M
        steps:
          - instruction: Add flour, salt, and sliced butter to food processor
            ingredients:
              - name: all-purpose flour
                qty: 400
                unit: gram
                note: approximately 2 1/2 cups
              - name: kosher salt
                qty: 8
                unit: gram
                note: approximately 1 1/2 teaspoons
              - name: butter
                qty: 170
                unit: gram
                note: 12 tablespoons, sliced, cold
            equipment:
              - food processor
          - instruction: Process for 15 seconds until mixture looks pebbly
          - instruction: Add sour cream and egg, process just until dough becomes yellow and starts to look like dough
            ingredients:
              - name: sour cream
                qty: 85
                unit: gram
                note: approximately 1/3 cup
              - name: eggs
                qty: 1
                unit: large
          - instruction: Flip out onto work surface and gently combine, pressing into a rectangle
          - instruction: Wrap and refrigerate for 20 minutes minimum
            equipment:
              - plastic wrap
          - instruction: Remove from refrigerator, slice off a portion for rolling
            note: For 8-inch casserole dish, use approximately 300-350g dough for top crust
        storage: Refrigerate up to 2 days; bring to cool room temperature before rolling

  - id: assembly-and-bake
    description: Build and Bake
    preparations:
      - id: assemble-and-bake
        description: Assemble pot pie in casserole dish and bake
        time: "2026-04-18T18:05:00"
        duration: PT45M
        final: true
        follows:
          - make-pie-filling
          - make-pie-crust
        steps:
          - instruction: Preheat oven to 405°F (205°C)
            equipment:
              - oven
          - instruction: Roll out pie crust dough until approximately 3mm (1/8 inch) thick round
            note: Should be slightly larger than the 8-inch (2qt) casserole dish
            equipment:
              - rolling pin
          - instruction: Fill 8-inch (2qt) casserole dish most of the way full with pot pie filling
            equipment:
              - 8-inch (2qt) casserole dish
            note: Target approximately 1.4-1.6kg filling
          - instruction: Prepare egg wash by whisking equal parts egg and cream
            ingredients:
              - name: eggs
                qty: 1
                unit: large
                note: use half for egg wash
              - name: heavy cream
                qty: 30
                unit: ml
                note: equal parts to egg
          - instruction: Coat rim and sides of casserole dish with egg wash using pastry brush
            equipment:
              - pastry brush
          - instruction: Top filling with rolled-out dough round, allowing overhang around edges
            ingredients:
              - name: pie crust dough
                homemade: true
          - instruction: Pinch dough to adhere to casserole dish rim
          - instruction: Cut slits in top of dough for steam vents
          - instruction: Brush dough surface with egg wash
          - instruction: Place casserole on a sheet tray to catch drips
            equipment:
              - sheet tray
          - instruction: Bake in preheated oven for 25 minutes until crust is cooked and golden brown
            note: Pies are finished when crust is deeply golden and filling is visibly bubbling
          - instruction: Allow to cool slightly 10-15 minutes before serving
            note: Allows filling to set slightly
        storage: Best served immediately; leftovers can be refrigerated and reheated
