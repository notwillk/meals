id: kunafe
description: Kunafe
note: Sweet cheese in shredded phyllo

yield:
  qty: 6-8
  unit: servings

components:
  - id: pastry
    description: Shredded Phyllo (Kataifi)
    preparations:
      - id: prep-kataifi
        description: Prepare buttered shredded phyllo base
        duration: PT30M
        steps:
          - instruction: Thaw kataifi completely at room temperature for 2 hours or overnight in refrigerator
            ingredients:
              - name: kataifi (shredded phyllo)
                qty: 200
                unit: gram
            equipment:
              - refrigerator
          - instruction: Gently separate kataifi strands to avoid clumping
          - instruction: Cut kataifi into 5 cm (2-inch) lengths using kitchen shears or food processor (pulse, do not over-process)
            equipment:
              - kitchen shears or food processor
          - instruction: Melt butter in saucepan or microwave
            ingredients:
              - name: butter
                qty: 100
                unit: gram
            equipment:
              - saucepan or microwave
          - instruction: Toss chopped kataifi with melted butter until every strand is coated
            note: Use clean hands for even distribution; strands should be glossy but not dripping
            equipment:
              - large mixing bowl
        storage: Refrigerate up to 24 hours in airtight container

  - id: cheese
    description: Sweet Cheese Filling
    preparations:
      - id: prep-cheese
        description: Prepare dried cheese blend
        duration: PT20M
        steps:
          - instruction: Shred low-moisture mozzarella and press between paper towels to remove excess moisture
            ingredients:
              - name: low-moisture mozzarella cheese
                qty: 200
                unit: gram
                preparation: shredded, pressed dry
            equipment:
              - paper towels
          - instruction: Drain ricotta in fine sieve for 10-15 minutes until no longer wet
            ingredients:
              - name: ricotta cheese
                qty: 100
                unit: gram
            equipment:
              - fine strainer or cheesecloth
          - instruction: Combine mozzarella and ricotta in bowl, mix until uniform
            note: Cheese must be as dry as possible to prevent soggy crust; target texture is tacky, not wet, with no visible liquid when pressed
            equipment:
              - mixing bowl
              - spatula
        storage: Refrigerate up to 24 hours
        note: For more traditional stretch and lower moisture, substitute with akkawi or nabulsi cheese (desalted)

  - id: syrup
    description: Sweet Orange Blossom Syrup (Atar)
    preparations:
      - id: make-syrup
        description: Prepare soaking syrup with thread stage consistency
        duration: PT20M
        steps:
          - instruction: Combine sugar, water, lemon juice, and a pinch of salt in small saucepan
            ingredients:
              - name: granulated sugar
                qty: 120
                unit: gram
              - name: water
                qty: 60
                unit: ml
              - name: lemon juice
                qty: 5
                unit: ml
              - name: fine salt
                qty: 0.5
                unit: gram
            equipment:
              - small saucepan
              - candy thermometer
          - instruction: Bring to boil over medium heat, then reduce to simmer
          - instruction: Simmer 5-7 minutes until thread stage (105 degrees C / 220 degrees F) or until clear and slightly thickened
            note: Syrup should coat back of spoon; do not overcook or it will crystallize
          - instruction: Remove from heat, stir in orange blossom water and optional rose water
            ingredients:
              - name: orange blossom water
                qty: 5
                unit: ml
              - name: rose water
                qty: 2.5
                unit: ml
                note: optional
          - instruction: Cool slightly, then keep warm (not hot) for pouring
            note: Hot kunafe with warm (not hot) syrup ensures proper absorption without sogginess
        storage: Refrigerate up to 1 week; rewarm before use

  - id: service
    description: Assembly, Baking & Service
    preparations:
      - id: bake-and-serve
        description: Assemble and bake kunafe
        duration: PT45M
        final: true
        follows:
          - prep-kataifi
          - prep-cheese
          - make-syrup
        steps:
          - instruction: Preheat oven to 200 degrees C (400 degrees F) with rack in lower-middle position
            equipment:
              - oven
          - instruction: Lightly grease 8-inch round (20 cm), 7x11-inch rectangular baking pan, or 8-inch carbon steel pan with butter (8–10 g for carbon steel)
            note: Carbon steel must be well-seasoned; optionally dust lightly with sugar after greasing to improve release and caramelization
            ingredients:
              - name: butter (for greasing)
                qty: 8
                unit: gram
            equipment:
              - 8-inch round or 7x11-inch rectangular baking pan or 8-inch carbon steel pan
          - instruction: Press 133 g of buttered kataifi into even layer across bottom, creating slight rim at edges
            note: Press firmly to compact; layer should not exceed 2.5 cm (1 inch) thick
            equipment:
              - spatula or clean hands
          - instruction: Spread cheese filling evenly across base layer, leaving 1 cm (1/2 inch) border from pan edges
            note: Critical - cheese must not touch pan edges to prevent leaking
          - instruction: Top with remaining 70 g of buttered kataifi, press firmly to compact top layer
          - instruction: Bake 25–35 minutes until deep golden brown, edges pulling away from pan, cheese bubbling at edges, and bottom is deeply caramelized and rigid when lifted slightly with spatula
            note: Check early (around 25 minutes) when using carbon steel; rotate pan or move to higher rack if bottom browns too quickly
            equipment:
              - oven
              - oven mitts
          - instruction: While baking, ensure syrup is warm (approximately 50 degrees C / 120 degrees F)
          - instruction: Remove from oven and rest 2-3 minutes to allow structure to set slightly
          - instruction: Invert onto rimmed serving platter
            note: Invert while hot (after brief rest) to prevent sticking; use plate slightly larger than pan
            equipment:
              - rimmed serving platter
          - instruction: Pour approximately 120 ml warm syrup evenly over hot kunafe in stages, allowing it to soak in
            note: Do not oversaturate; reserve remaining syrup if needed
          - instruction: Garnish with finely chopped pistachios immediately before serving
            ingredients:
              - name: pistachios, finely chopped
                qty: 30
                unit: gram
                note: optional
          - instruction: Cut into 6–8 portions using serrated knife and serve warm
            note: Optimal texture is crisp exterior with stretchy melted cheese; presentation as cheese course, reveal as dessert through syrup and floral notes