id: its-a-trap
description: It's a Trap!

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        final: true
        steps:
          - instruction: Combine all ingredients in shaking tin with ice
            ingredients:
              - name: Appleton estate rum
                qty: 1
                unit: oz
              - name: Plantation 3 star rum
                qty: 1
                unit: oz
              - name: Pierre Ferrand cognac
                qty: 0.5
                unit: oz
              - name: Pierre Ferrand dry curacao
                qty: 0.5
                unit: oz
              - name: Orgeat
                qty: 0.25
                unit: oz
              - name: Simple syrup
                qty: 1
                unit: oz
              - name: Orange juice
                qty: 3
                unit: oz
              - name: Lemon juice
                qty: 2
                unit: oz
          - instruction: Shake well, strain into glass
          - instruction: Garnish with orange wheel, flower, and mint sprig
        storage: Serve immediately
