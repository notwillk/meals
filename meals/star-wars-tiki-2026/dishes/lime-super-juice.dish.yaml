id: lime-super-juice
description: Lime Super Juice

yield:
  qty: 1000
  unit: ml

components:
  - id: prep-lime-super-juice
    description: Make lime super juice
    preparations:
      - id: make-lime-super-juice
        description: Make lime super juice
        final: true
        steps:
          - instruction: Peel limes carefully with vegetable peeler, avoiding the bitter white pith
            ingredients:
              - name: limes, organic
                qty: 6
                unit: count
            note: Use organic limes
          - instruction: Record peel weight (target ~60g), calculate and record the citric/malic acid quantities.  Place peels and acid powders into vacuum seal bag
            ingredients:
              - name: lime peels
                qty: 60
                unit: g
                note: ~6 limes, peel carefully avoiding white pith
              - name: citric acid
                qty: 40
                unit: g
                note: W × 0.66
              - name: malic acid
                qty: 20
                unit: g
                note: W × 0.33
          - instruction: Vacuum seal the bag, massage bag vigorously for 60 seconds to press acid into peels
          - instruction: Let sit for 15–20 minutes
            note: Acid turns into liquid syrup drawing out essential oils
          - instruction: Juice the naked fruit, refrigerate until required
          - instruction: Cut open bag, pour Oleo Citrate into blender with water
            ingredients:
              - name: water
                qty: 1000
                unit: g
                note: room temperature, distilled or filtered
            note: rinse the bag with the water to get every last drop of the oleo citrate
          - instruction: Add fresh lime juice from juiced fruit
          - instruction: Blend on high for 30–60 seconds until milky/opaque
          - instruction: Pour into nut milk bag over large bowl, squeezing bag firmly to extract every drop
          - instruction: Discard dry pulp, bottle liquid
        storage: Refrigerate, stays bright for 1-2 weeks (vs 4-6 hours for fresh juice)
        yield: '~1000ml from ~6 limes'
