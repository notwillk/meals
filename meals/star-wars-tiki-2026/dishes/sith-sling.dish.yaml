id: sith-sling
description: Sith Sling

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        time: '2026-05-03T13:30:00'
        duration: 'PT2M'
        final: true
        steps:
          - instruction: Combine all ingredients in shaking tin with ice
            ingredients:
              - name: Gin
                qty: 0.75
                unit: oz
              - name: Pierre Ferrand dry curacao
                qty: 0.25
                unit: oz
              - name: Heering cherry liqueur
                qty: 0.25
                unit: oz
              - name: Benedictine
                qty: 0.25
                unit: oz
              - name: Angostura bitters
                qty: 1
                unit: dash
              - name: Pineapple juice
                qty: 1
                unit: oz
              - name: Lime juice
                qty: 0.5
                unit: oz
          - instruction: Shake well, strain into glass
          - instruction: Top with club soda
          - instruction: Garnish with orange wheel and cherry
        storage: Serve immediately
