id: the-droids-caboose
description: The Droid's Caboose

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        time: '2026-05-03T13:30:00'
        duration: 'PT2M'
        final: true
        steps:
          - instruction: Combine all ingredients in mixing glass with ice
            ingredients:
              - name: Monkey Shoulder scotch
                qty: 1
                unit: oz
              - name: mezcal
                qty: 1
                unit: oz
              - name: Orgeat
                qty: 0.75
                unit: oz
              - name: lime juice
                qty: 0.75
                unit: oz
              - name: celery bitters
                qty: 2
                unit: dashes
          - instruction: Stir well, strain into chilled coupe glass
          - instruction: Garnish
        storage: Serve immediately
