id: demerara-syrup
description: Demerara Syrup

yield:
  qty: 200
  unit: ml

components:
  - id: prep-demerara-syrup
    description: Make demerara syrup
    preparations:
      - id: make-demerara-syrup
        description: Make demerara syrup
        steps:
          - instruction: Combine demerara sugar and water in a vacuum seal bag
            ingredients:
              - name: demerara sugar
                qty: 133
                unit: g
              - name: water
                qty: 67
                unit: g
          - instruction: Seal bag using vacuum sealer
          - instruction: Sous vide at 150°F / 65°C for 1 hour
          - instruction: Remove from water bath, shake or massage bag to combine
        notes:
          - No strain needed - syrup is naturally smooth
          - Store at room temperature short-term, refrigerate long-term
