id: strawberry-syrup
description: Strawberry Syrup

yield:
  qty: 200
  unit: ml

components:
  - id: prep-strawberry-syrup
    description: Make strawberry syrup
    preparations:
      - id: make-strawberry-syrup
        description: Make strawberry syrup
        steps:
          - instruction: Combine sugar and water in a vacuum seal bag, stir to dissolve
            ingredients:
              - name: sugar
                qty: 200
                unit: g
              - name: water
                qty: 100
                unit: g
          - instruction: Add strawberry pulp to the bag
            ingredients:
              - name: strawberry pulp
                qty: 397
                unit: g
                note: Goya pulp
          - instruction: Seal bag using vacuum sealer
          - instruction: Sous vide at 145°F / 63°C for 2–3 hours
          - instruction: Remove from water bath, stir well to combine
          - instruction: Fine strain for clean cocktail use, squeeze to extract liquid
        notes:
          - Store refrigerated
