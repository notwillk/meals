id: lemon-super-juice
description: Lemon Super Juice

yield:
  qty: 1000
  unit: ml

components:
  - id: prep-lemon-super-juice
    description: Make lemon super juice
    preparations:
      - id: make-lemon-super-juice
        description: Make lemon super juice
        final: true
        time: '2026-05-02T12:30:00'
        duration: 'PT30M'
        steps:
          - instruction: Peel lemons carefully with vegetable peeler, avoiding the bitter white pith
            ingredients:
              - name: lemons, organic
                qty: 3
                unit: count
            note: Use organic lemons
          - instruction: Record peel weight (target ~60g), calculate and record the citric acid quantity.  Place peels and citric acid into vacuum seal bag
            ingredients:
              - name: lemon peels
                qty: 60
                unit: g
                note: ~3 lemons, peel carefully avoiding white pith
              - name: citric acid
                qty: 60
                unit: g
                note: equal to weight of peels (W × 1.0)
          - instruction: Vacuum seal the bag, massage bag vigorously for 60 seconds to press acid into peels
          - instruction: Let sit for 15–20 minutes
            note: Acid turns into liquid syrup drawing out essential oils
          - instruction: Juice the naked fruit, refrigerate until required
          - instruction: Cut open bag, pour Oleo Citrate into blender with water
            ingredients:
              - name: water
                qty: 1000
                unit: g
                note: room temperature, distilled or filtered
            note: rinse the bag with the water to get every last drop of the oleo citrate
          - instruction: Add fresh lemon juice from juiced fruit
          - instruction: Blend on high for 30–60 seconds until milky/opaque
          - instruction: Pour into nut milk bag over large bowl, squeezing bag firmly to extract every drop
          - instruction: Discard dry pulp, bottle liquid
        storage: Refrigerate, stays bright for 1-2 weeks (vs 4-6 hours for fresh juice)
        yield: '~1000ml from ~3 lemons'
