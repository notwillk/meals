id: carbonite-cooler
description: Carbonite Cooler

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        final: true
        steps:
          - instruction: Blend all ingredients with ice
            equipment:
              - blender
            ingredients:
              - name: El Dorado 5 year rum
                qty: 2
                unit: oz
              - name: Pineapple juice
                qty: 4
                unit: oz
              - name: Orange juice
                qty: 1
                unit: oz
              - name: Creme of coconut
                qty: 1
                unit: oz
          - instruction: Pour into glass, garnish with grated nutmeg and pineapple fronds
        storage: Serve immediately
