id: flying-porg
description: Flying Porg

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        final: true
        steps:
          - instruction: Combine all ingredients in shaking tin with ice
            ingredients:
              - name: Appleton estate rum
                qty: 1.5
                unit: oz
              - name: Wild Turkey 101
                qty: 0.75
                unit: oz
              - name: Demerara syrup
                qty: 0.5
                unit: oz
              - name: Pineapple juice
                qty: 1.5
                unit: oz
              - name: Lime juice
                qty: 0.5
                unit: oz
          - instruction: Shake well, strain into highball with ice
          - instruction: Garnish with pineapple wedge, pineapple fronds, and cherry
        storage: Serve immediately
