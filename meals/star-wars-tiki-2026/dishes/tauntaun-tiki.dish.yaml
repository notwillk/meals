id: tauntaun-tiki
description: Tauntaun Tiki

yield:
  qty: 1
  unit: serving

components:
  - id: build-drink
    description: Build drink
    preparations:
      - id: build
        description: Build drink
        time: '2026-05-03T13:30:00'
        duration: 'PT2M'
        final: true
        steps:
          - instruction: Combine all ingredients in shaking tin with ice
            ingredients:
              - name: El Dorado 5 year rum
                qty: 2
                unit: oz
              - name: Plantation 3 star rum
                qty: 2
                unit: oz
              - name: Passionfruit syrup
                qty: 1
                unit: oz
              - name: Grenadine
                qty: 1
                unit: tsp
              - name: Orange juice
                qty: 1
                unit: oz
              - name: Lime juice
                qty: 1
                unit: oz
          - instruction: Shake well, strain into glass
          - instruction: Garnish with 2 cherries
        storage: Serve immediately
