rules:
  - name: no trailing whitespace in yaml/json
    check: '! git ls-files -- "*.yaml" "*.json" | xargs grep -Hn " $"'
    severity: error
  - name: check yaml schema (dish)
    check: git ls-files -- "*.dish.yaml" | xargs check-jsonschema --schemafile schemas/dish.schema.json
    severity: error
  - name: check yaml schema (menu)
    check: git ls-files -- "*.menu.yaml" | xargs check-jsonschema --schemafile schemas/menu.schema.json
    severity: error
  - name: check yaml schema (errand)
    check: git ls-files -- "meals/**/errands.yaml" | xargs check-jsonschema --schemafile schemas/errand.schema.json
    severity: error
  - name: no pending format issues
    check: just format --check
    fix: just format
    severity: error
